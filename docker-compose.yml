services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-homework_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-grafana-user.sql:/docker-entrypoint-initdb.d/init-grafana-user.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-homework_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  migrate:
    build: .
    command: uv run alembic upgrade head
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-homework_db}
      - BOT_TOKEN=${BOT_TOKEN}
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    command: uv run python main_api.py
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-homework_db}
      - BOT_TOKEN=${BOT_TOKEN}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-https://glinka-ht.ru}
      - FILE_STORAGE_DIR=/app/uploads
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prom_mp
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  worker:
    build: .
    command: uv run python -m app.worker.main
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-homework_db}
      - BOT_TOKEN=${BOT_TOKEN}
      - FILE_STORAGE_DIR=/app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - CADDY_ADMIN_HASH=${CADDY_ADMIN_HASH:?Set CADDY_ADMIN_HASH in .env}
    depends_on:
      - api
      - frontend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  prometheus:
    image: prom/prometheus:v3.4.0
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  loki:
    image: grafana/loki:3.5.0
    restart: unless-stopped
    volumes:
      - ./monitoring/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yml
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  promtail:
    image: grafana/promtail:3.5.0
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail.yml
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  grafana:
    image: grafana/grafana:12.0.2
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD in .env}
      - GF_SERVER_ROOT_URL=https://glinka-ht.ru/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GRAFANA_PG_PASSWORD=grafana_reader_pass
    depends_on:
      - prometheus
      - loki
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  uploads:
  prometheus_data:
  loki_data:
  grafana_data:
