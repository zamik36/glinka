name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: homework_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/homework_db
      BOT_TOKEN: test-token-for-ci
      DEBUG: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Audit dependencies
        run: uv run pip-audit

      - name: Type check
        run: uv run ty check app/

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest -v --cov=app --cov-report=term-missing

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker network create web 2>/dev/null || true
            cd "${{ secrets.VPS_PROJECT_PATH }}"
            git config --global safe.directory "${{ secrets.VPS_PROJECT_PATH }}"
            git pull origin main
            docker compose build
            docker compose run --rm migrate
            docker compose up -d
            curl -f --retry 10 --retry-delay 3 --retry-connrefused https://glinka-ht.ru/ || exit 1

  deploy-stage:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    environment: staging

    steps:
      - name: Deploy to VPS (staging)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker network create web 2>/dev/null || true
            cd "${{ secrets.VPS_STAGE_PATH }}"
            git config --global safe.directory "${{ secrets.VPS_STAGE_PATH }}"
            git pull origin dev
            docker compose -f docker-compose.yml -f docker-compose.stage.yml build
            docker compose -f docker-compose.yml -f docker-compose.stage.yml run --rm migrate
            docker compose -f docker-compose.yml -f docker-compose.stage.yml up -d
            curl -f --retry 10 --retry-delay 3 --retry-connrefused https://stage.glinka-ht.ru/ || exit 1
